<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CRM UNICARS · Auto Send</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#0a7c5c;--primary-hover:#066347;--secondary:#fff;--bg:#f8fafc;--text:#1e293b;--border:#e2e8f0;--danger:#dc2626;--sent-bg:#fee2e2}
        body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:20px}
        .container{max-width:1200px;margin:0 auto}
        header{text-align:center;margin-bottom:28px}
        header h1{color:var(--primary);font-size:2.2rem;display:flex;align-items:center;justify-content:center;gap:10px}
        .card{background:var(--secondary);border-radius:20px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);padding:24px;margin-bottom:20px;border:1px solid var(--border)}
        .btn{padding:10px 22px;border-radius:60px;border:none;cursor:pointer;font-size:0.95rem;font-weight:500;display:inline-flex;align-items:center;gap:8px;background:white;border:1px solid var(--border);transition:all 0.15s}
        .btn-primary{background:var(--primary);color:white;border:none}
        .btn-primary:hover{background:var(--primary-hover)}
        .btn-danger{background:var(--danger);color:white;border:none}
        .file-upload{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
        input[type="file"]{display:none}
        .file-name{color:#475569;background:#f1f5f9;padding:6px 14px;border-radius:40px}
        textarea{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:16px;font-family:inherit}
        .action-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
        .stats{margin-left:auto;background:#f1f5f9;padding:6px 16px;border-radius:40px}
        .badge{background:var(--primary);color:white;padding:2px 10px;border-radius:40px;margin-left:8px}
        .table-container{max-height:500px;overflow:auto;border-radius:16px;border:1px solid var(--border)}
        table{width:100%;border-collapse:collapse}
        th,td{padding:14px 16px;border-bottom:1px solid var(--border)}
        th{background:#f8fafc;position:sticky;top:0}
        tr.sent-row{background:var(--sent-bg)!important}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:1000}
        .modal-content{background:white;padding:28px;border-radius:28px;min-width:360px}
        .delay-control{margin:15px 0;display:flex;align-items:center;gap:10px;justify-content:center}
        .delay-control input{width:70px;padding:8px;border:1px solid var(--border);border-radius:8px;text-align:center}
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1><i class="fas fa-car"></i> CRM UNICARS <i class="fab fa-whatsapp" style="color:#25D366;"></i></h1>
        <p>Upload · Clean · Auto Send · Track</p>
    </header>

    <section class="card">
        <h2><i class="fas fa-cloud-upload-alt"></i> 1. Import Data</h2>
        <div class="file-upload">
            <input type="file" id="fileInput" accept=".xlsx,.csv" />
            <label for="fileInput" class="btn btn-primary"><i class="fas fa-folder-open"></i> Choose File</label>
            <span id="fileName" class="file-name"><i class="far fa-file"></i> No file chosen</span>
        </div>
        <small><i class="fas fa-info-circle"></i> Numbers like 971501234567 or +971501234567 are fine.</small>
    </section>

    <section class="card" id="message-section" style="display:none;">
        <h2><i class="fas fa-pen"></i> 2. Message Template</h2>
        <textarea id="messageInput" rows="3" placeholder="Hello {name}, this is UNICARS..."></textarea>
        <small>Use <code>{name}</code> for customer name.</small>
    </section>

    <section class="card" id="actions-section" style="display:none;">
        <div class="action-bar">
            <button id="exportBtn" class="btn"><i class="fas fa-download"></i> Export CSV</button>
            <button id="resetSentBtn" class="btn"><i class="fas fa-undo-alt"></i> Reset</button>
            <button id="autoSendBtn" class="btn btn-primary"><i class="fas fa-play"></i> Auto Send All</button>
            <button id="stopAutoBtn" class="btn btn-danger" style="display:none;"><i class="fas fa-stop"></i> Stop Auto</button>
            <span class="stats" id="statsText">0 contacts</span>
        </div>
        <div class="delay-control">
            <label><i class="fas fa-clock"></i> Delay (seconds):</label>
            <input type="number" id="delaySeconds" min="1" max="10" value="3" step="0.5">
            <small>(Time between opening tabs)</small>
        </div>
    </section>

    <section class="card" id="list-section" style="display:none;">
        <h2><i class="fas fa-list-ul"></i> Customer List <span id="countBadge" class="badge">0</span></h2>
        <div class="table-container">
            <table id="customerTable">
                <thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="customerTableBody"></tbody>
            </table>
        </div>
    </section>
</div>

<script>
    (function(){
        let customers = [];
        let autoTimer = null;
        let autoIndex = 0;
        let isAutoSending = false;

        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const messageSection = document.getElementById('message-section');
        const actionsSection = document.getElementById('actions-section');
        const listSection = document.getElementById('list-section');
        const messageInput = document.getElementById('messageInput');
        const customerTableBody = document.getElementById('customerTableBody');
        const countBadge = document.getElementById('countBadge');
        const statsText = document.getElementById('statsText');
        const autoSendBtn = document.getElementById('autoSendBtn');
        const stopAutoBtn = document.getElementById('stopAutoBtn');
        const delaySeconds = document.getElementById('delaySeconds');

        function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
        function normalizePhone(p){let c=String(p).replace(/[^\d+]/g,'');return c.startsWith('+')?'+'+c.replace(/\D/g,''):c.replace(/\D/g,'');}
        function findColumn(row,names){const keys=Object.keys(row);for(let n of names){const e=keys.find(k=>k.trim().toLowerCase()===n.toLowerCase());if(e&&row[e])return row[e];}for(let n of names){const p=keys.find(k=>k.toLowerCase().includes(n.toLowerCase()));if(p&&row[p])return row[p];}return null;}

        function processData(raw){
            const seen=new Set(); const out=[]; let cnt=1;
            for(let r of raw){
                const name=findColumn(r,['name','nome','customer','client','full name','contact','اسم']);
                const phone=findColumn(r,['phone','mobile','cell','telefone','celular','whatsapp','contact number','رقم']);
                if(!phone) continue;
                const clean=normalizePhone(phone);
                if(!clean||clean.length<5||seen.has(clean)) continue;
                seen.add(clean);
                let finalName=name?String(name).trim():`Customer ${cnt++}`;
                out.push({name:finalName,phone:clean,sent:false});
            }
            return out;
        }

        async function parseFile(file){
            if(file.name.endsWith('.csv')){
                return new Promise((res,rej)=>Papa.parse(file,{header:true,skipEmptyLines:true,complete:r=>res(r.data),error:rej}));
            }else{
                return new Promise((res,rej)=>{
                    const reader=new FileReader();
                    reader.onload=e=>{
                        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
                        res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
                    };
                    reader.onerror=rej;
                    reader.readAsArrayBuffer(file);
                });
            }
        }

        function renderTable(){
            const frag=document.createDocumentFragment();
            customers.forEach((c,i)=>{
                const tr=document.createElement('tr');
                if(c.sent) tr.classList.add('sent-row');
                tr.innerHTML=`<td>${i+1}</td><td>${escapeHtml(c.name)}</td><td>${c.phone}</td><td><span class="badge" style="background:${c.sent?'var(--danger)':'#94a3b8'}">${c.sent?'✓ Sent':'Pending'}</span></td><td><button class="btn btn-primary btn-sm" onclick="sendSingle(${i})"><i class="fab fa-whatsapp"></i> Send</button></td>`;
                frag.appendChild(tr);
            });
            customerTableBody.innerHTML='';
            customerTableBody.appendChild(frag);
            countBadge.textContent=customers.length;
            updateStats();
        }

        function updateStats(){
            const sent=customers.filter(c=>c.sent).length;
            statsText.textContent=`${customers.length} contacts (${sent} sent)`;
        }

        function saveStorage(){
            localStorage.setItem('unicars_customers_v3',JSON.stringify(customers));
            localStorage.setItem('unicars_msg_v3',messageInput.value);
        }

        function loadStorage(){
            const saved=localStorage.getItem('unicars_customers_v3');
            const msg=localStorage.getItem('unicars_msg_v3');
            if(saved){customers=JSON.parse(saved);if(msg)messageInput.value=msg;renderTable();showSections();}
        }

        function showSections(){
            messageSection.style.display='block';
            actionsSection.style.display='block';
            listSection.style.display='block';
        }

        function buildMsg(cust){
            return (messageInput.value||'Hello {name},').replace(/\{name\}/g,cust.name);
        }

        function getLink(phone,msg){
            return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
        }

        window.sendSingle = function(idx){
            const c=customers[idx];
            window.open(getLink(c.phone,buildMsg(c)),'_blank');
            c.sent=true;
            renderTable();
            saveStorage();
        };

        // Auto-send logic
        function autoSendNext(){
            if(!isAutoSending) return;
            if(autoTimer) clearTimeout(autoTimer);
            
            if(autoIndex >= customers.length){
                stopAutoSend();
                alert('✅ All contacts processed!');
                return;
            }

            const cust = customers[autoIndex];
            const link = getLink(cust.phone, buildMsg(cust));
            window.open(link, '_blank');
            
            // Mark as sent
            cust.sent = true;
            renderTable();
            saveStorage();
            
            autoIndex++;
            
            if(autoIndex < customers.length && isAutoSending){
                const delay = parseFloat(delaySeconds.value) * 1000;
                autoTimer = setTimeout(()=> autoSendNext(), delay);
            } else if(autoIndex >= customers.length){
                stopAutoSend();
                alert('✅ All contacts processed!');
            }
        }

        function startAutoSend(){
            if(customers.length===0) return;
            // Find first unsent? Or start from 0. We'll start from first unsent.
            autoIndex = customers.findIndex(c=>!c.sent);
            if(autoIndex === -1){
                alert('All contacts already sent!');
                return;
            }
            isAutoSending = true;
            autoSendBtn.style.display = 'none';
            stopAutoBtn.style.display = 'inline-flex';
            autoSendNext();
        }

        function stopAutoSend(){
            isAutoSending = false;
            if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
            autoSendBtn.style.display = 'inline-flex';
            stopAutoBtn.style.display = 'none';
        }

        // Event listeners
        fileInput.addEventListener('change', async e=>{
            const f=e.target.files[0]; if(!f)return;
            fileName.innerHTML=`<i class="far fa-file"></i> ${f.name}`;
            try{
                const raw = await parseFile(f);
                customers = processData(raw);
                saveStorage();
                renderTable();
                showSections();
            }catch(err){alert('Error: '+err.message);}
        });

        document.getElementById('exportBtn').addEventListener('click',()=>{
            if(!customers.length)return;
            const csv=Papa.unparse(customers.map(c=>({Name:c.name,Phone:c.phone,Sent:c.sent?'Yes':'No'})));
            const blob=new Blob([csv],{type:'text/csv'});
            const a=document.createElement('a');
            a.href=URL.createObjectURL(blob);
            a.download=`unicars_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        });

        document.getElementById('resetSentBtn').addEventListener('click',()=>{
            if(confirm('Reset sent status?')){customers.forEach(c=>c.sent=false);renderTable();saveStorage();}
        });

        autoSendBtn.addEventListener('click', startAutoSend);
        stopAutoBtn.addEventListener('click', stopAutoSend);
        messageInput.addEventListener('input', saveStorage);

        loadStorage();
    })();
</script>
</body>
</html>
